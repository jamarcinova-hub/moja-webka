<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja prvá webka</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 16px;
      max-width: 520px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.4;
    }

    a {
      display: inline-block;
      margin-top: 12px;
      color: #111;
      text-decoration: none;
      border-bottom: 2px solid #111;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ahoj, ja som Nina</h1>
    <p>Učím sa HTML a CSS. Toto je moja prvá live webka, verzia 2.0.</p>
    <a href="https://example.com">Moje linky</a>
  </div>
</body>
</html>
